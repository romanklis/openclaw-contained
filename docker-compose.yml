services:
  # =============================================================================
  # CONTROL PLANE — Core API
  # =============================================================================
  control-plane:
    build:
      context: ./services/control-plane
      dockerfile: Dockerfile
    container_name: openclaw-control-plane
    environment:
      - DATABASE_URL=postgresql+asyncpg://openclaw:${POSTGRES_PASSWORD:-openclaw_pass}@postgres:5432/openclaw
      - TEMPORAL_HOST=temporal:7233
      - IMAGE_BUILDER_URL=http://image-builder:8002
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AGENT_SANDBOX_MODE=${AGENT_SANDBOX_MODE:-gvisor}
      - AGENT_IMAGES_DIR=/agent-images
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - openclaw-network
    volumes:
      - ./workspaces:/workspaces
      - ./agent-images:/agent-images:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # =============================================================================
  # IMAGE BUILDER — Builds agent Docker images on capability approval
  # =============================================================================
  image-builder:
    build:
      context: ./services/image-builder
      dockerfile: Dockerfile
    container_name: openclaw-image-builder
    privileged: true
    environment:
      - DOCKER_HOST=tcp://docker-dind:2375
      - REGISTRY_URL=registry:5000
      - DATABASE_URL=postgresql+asyncpg://openclaw:${POSTGRES_PASSWORD:-openclaw_pass}@postgres:5432/openclaw
      - AGENT_IMAGES_DIR=/agent-images
      - CONTROL_PLANE_URL=http://control-plane:8000
    depends_on:
      - docker-dind
      - postgres
      - registry
    volumes:
      - ./services/image-builder/templates:/app/templates
      - ./services/agent-executor:/agent-executor:ro
      - ./openclaw:/openclaw:ro
      - ./agent-images:/agent-images
      - ./workspaces:/workspaces
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================================================
  # DOCKER-IN-DOCKER — Runs agent & deployment containers
  # =============================================================================
  docker-dind:
    build:
      context: ./docker-dind
      dockerfile: Dockerfile
    container_name: openclaw-docker-dind
    privileged: true
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
    volumes:
      - docker-data:/var/lib/docker
      - ./docker-dind-daemon.json:/etc/docker/daemon.json:ro
      - ./workspaces:/workspaces
      - ./agent-images:/agent-images:ro
    ports:
      - "9100-9120:9100-9120"
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "docker", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================================================
  # DOCKER REGISTRY — Stores built agent images
  # =============================================================================
  registry:
    image: registry:2
    container_name: openclaw-registry
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - openclaw-network
    restart: unless-stopped

  # =============================================================================
  # TEMPORAL — Workflow orchestration
  # =============================================================================
  temporal-postgres:
    image: postgres:13
    container_name: openclaw-temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - openclaw-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.22
    container_name: openclaw-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
      - POSTGRES_SEEDS=temporal-postgres
    depends_on:
      - temporal-postgres
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD-SHELL", "netstat -ltn | grep ':7233' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.40.1
    container_name: openclaw-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_GRPC_ENDPOINT=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "8088:8080"
    networks:
      - openclaw-network
    restart: unless-stopped

  # =============================================================================
  # TEMPORAL WORKER — Executes task workflows
  # =============================================================================
  temporal-worker:
    build:
      context: ./services/temporal-worker
      dockerfile: Dockerfile
    environment:
      - TEMPORAL_HOST=temporal:7233
      - DOCKER_HOST=tcp://docker-dind:2375
      - DATABASE_URL=postgresql+asyncpg://openclaw:${POSTGRES_PASSWORD:-openclaw_pass}@postgres:5432/openclaw
      - CONTROL_PLANE_URL=http://control-plane:8000
      - IMAGE_BUILDER_URL=http://openclaw-image-builder:8002
      - AGENT_IMAGES_DIR=/agent-images
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - AGENT_SANDBOX_MODE=${AGENT_SANDBOX_MODE:-insecure-dind}
    depends_on:
      temporal:
        condition: service_healthy
      control-plane:
        condition: service_healthy
      docker-dind:
        condition: service_healthy
    volumes:
      - ./workspaces:/workspaces
      - ./agent-images:/agent-images
    networks:
      - openclaw-network
    deploy:
      replicas: 1
    restart: unless-stopped

  # =============================================================================
  # FRONTEND — Next.js dashboard
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openclaw-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_API_GATEWAY_URL=${API_GATEWAY_URL:-http://localhost:8080}
    depends_on:
      - control-plane
    ports:
      - "3000:3000"
    networks:
      - openclaw-network
    restart: unless-stopped

  # =============================================================================
  # REDIS — Lightweight session store for the API Gateway
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    command: redis-server --save "" --appendonly no
    networks:
      - openclaw-network
    restart: unless-stopped

  # =============================================================================
  # API GATEWAY — OpenAI-Compatible Chat Completions Gateway
  # Maps stateless OpenAI requests to stateful Temporal Workflows.
  # POST /v1/chat/completions  →  create / continue TaskForge tasks.
  # =============================================================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: openclaw-api-gateway
    environment:
      - CONTROL_PLANE_URL=http://control-plane:8000
      - REDIS_URL=redis://redis:6379/1
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-gemini-2.0-flash-exp}
      - SESSION_TTL_SECONDS=86400
      - POLL_INTERVAL_SECONDS=1.5
      - STREAM_TIMEOUT_SECONDS=1800
      - LOG_LEVEL=INFO
      - DASHBOARD_URL=http://localhost:3000
      - IMAGE_BUILDER_URL=http://openclaw-image-builder:8002
    volumes:
      - ./services/api-gateway:/app          # live-reload during development
      - ./agent-images:/agent-images          # agent profiles registry (rw for editing)
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================================================
  # OPEN WEBUI — Chat UI wired to the OpenAI-Compatible API Gateway
  # Access at http://localhost:3001
  # On first launch: create an account (stored locally), select
  # the "taskforge-iterator" model, and start chatting.
  # =============================================================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openclaw-open-webui
    environment:
      # Point Open WebUI exclusively at our gateway (disable Ollama direct access)
      - OPENAI_API_BASE_URL=http://api-gateway:8080/v1
      - OPENAI_API_BASE_URLS=http://api-gateway:8080/v1
      - OPENAI_API_KEY=sk-openclaw-gateway
      - OLLAMA_BASE_URL=
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-open-webui-secret}
      - WEBUI_NAME=OpenClaw Chat
      - DEFAULT_MODELS=taskforge-iterator
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_MESSAGE_RATING=false
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3001:8080"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - openclaw-network
    restart: unless-stopped

  # =============================================================================
  # POSTGRESQL — Primary database
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: openclaw-postgres
    environment:
      - POSTGRES_USER=openclaw
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openclaw_pass}
      - POSTGRES_DB=openclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  openclaw-network:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres-data:
  temporal-postgres-data:
  registry-data:
  docker-data:
  open-webui-data:
